<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: 'Inter', 'Segoe UI', sans-serif;
  background: #000;
  color: #fff;
}

.banner {
  width: 100%;
  height: 300px;
  background: url("https://cdn.discordapp.com/attachments/1496200606908416030/1496234538353954836/CBB229E5-DC48-4DE6-9FCA-110EB8B41C45.png") center/cover no-repeat;
}

.container {
  width: 90%;
  max-width: 1000px;
  margin: auto;
  text-align: center;
}

.logo {
  width: 90px;
  margin-top: -50px;
}

h1 {
  font-size: 42px;
  margin-top: 10px;
  color: white;
  font-weight: 600;
}

.subtitle {
  color: #aaa;
  margin-bottom: 30px;
}

.btn {
  border: 1px solid white;
  padding: 14px 28px;
  border-radius: 30px;
  text-decoration: none;
  color: white;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-weight: 500;
  transition: 0.2s ease;
}

.btn:hover {
  background: white;
  color: black;
}

.accordion {
  background: #111;
  color: white;
  cursor: pointer;
  padding: 18px;
  width: 100%;
  border: 1px solid #222;
  text-align: left;
  font-size: 17px;
  border-radius: 10px;
  margin-top: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.accordion:hover {
  background: #181818;
}

.left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.price {
  color: #ccc;
  font-weight: 500;
  margin-left: 10px;
}

.icon {
  color: #aaa;
}

.panel {
  display: none;
  background: #0a0a0a;
  padding: 20px;
  border-radius: 0 0 10px 10px;
}

.images {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.video-card {
  width: 100%;
  max-width: 500px;
  aspect-ratio: 16 / 9;
  border-radius: 12px;
  overflow: hidden;
}

.video-card iframe {
  width: 100%;
  height: 100%;
}

.images img {
  width: 260px;
  border-radius: 12px;
  filter: grayscale(100%);
  transition: 0.3s;
}

.images img:hover {
  filter: grayscale(0%);
  transform: scale(1.05);
}
</style>
</head>

<script>
const acc = document.getElementsByClassName("accordion");

for (let i = 0; i < acc.length; i++) {
  acc[i].addEventListener("click", function () {
    const panel = this.nextElementSibling;
    panel.style.display = panel.style.display === "block" ? "none" : "block";
  });
}
</script>
