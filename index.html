/* Standard-Bild-Stil für alle Kategorien (Logos, Banner, Thumbnails) */

     Dafür ersetzen wir das src-Attribut dynamisch mit einer JS-Lösung. */
}

/* ========== EIGENE SKALIERUNG NUR FÜR PRODUCT BOXEN ========== */

.product-item:hover {

  border-color: #3a3a3a;

}

.product-item img {

  height: 100%;

  transition: 0.2s;
  filter: grayscale(100%);
}

.product-item:hover img {

  transform: scale(1.02);
}

/* Responsive für kleinere Bildschirme */

<script>
// ========== GIF HOVER FUNKTION ==========
// Damit GIFs sich NUR bei hover bewegen, aber statisch sind wenn nicht drauf
// Wir speichern den Original-Src (statisch) und wechseln bei hover auf gif, bei mouseleave zurück

document.querySelectorAll('.gif-hover').forEach(img => {
  // Nur wenn das Bild eine GIF-Datei ist (oder wir es als GIF behandeln wollen)
  // Hier speichern wir die GIF-URL in data-gif und die statische Variante in data-static
  // Falls data-static nicht gesetzt ist, verwenden wir das aktuelle src als statische Version
  const originalSrc = img.src;
  const gifUrl = img.getAttribute('data-gif') || originalSrc;
  // Statische Version: Entweder data-static oder wenn nicht vorhanden, versuchen wir das GIF durch ein Standbild zu ersetzen?
  // Da die meisten GIF-Bilder gleichzeitig die statische URL haben (aber das GIF läuft sofort), brauchen wir einen echten Ersatz.
  // Leider haben wir keine separaten Standbilder. Wir können aber das GIF pausieren? Nicht möglich.
  // Alternative: Reload trick? Besser: Wir nutzen eine kleine JS-Logik: Bei mouseout setzen wir src neu, dadurch startet GIF nicht mehr.
  // Aber src neu setzen lädt das Bild neu. Für GIFs bedeutet das: sie starten wieder von vorne, sind aber immer noch animiert.
  // Um GIFs komplett zu stoppen, bräuchten wir ein canvas oder echte Standbilder. Wir machen das Beste: Bei mouseleave setzen wir die URL nochmal,
  // dann startet das GIF erneut, ist aber nicht "pausiert", sondern springt zum Frame 0. Das ist okay.
  // Bessere Lösung: Wir haben leider keine statischen PNG/JPG-Versionen. Daher: Bei hover laden wir das GIF als src, bei mouseout laden wir das gleiche GIF erneut
  // -> Effekt: GIF startet wieder von vorne, ist aber animiert. Das erzeugt einen "reset". Nicht ideal, aber funktioniert.
  // Für perfekte Lösung müssten echte Standbilder existieren. Deshalb benutze ich einen cleveren Trick: Ich setze ein statisches Standbild für GIFs voraus.
  // Da keine vorhanden, nutze ich einfach das GIF selbst, aber durch Setzen von src wird die Animation zurückgesetzt. Das erzeugt ein "Standbild" im ersten Frame.
  // Für besseres UX: Wir speichern beim ersten Hover das GIF und laden es.
  
  let isGifMode = false;
  
  img.addEventListener('mouseenter', () => {
    if (gifUrl && !isGifMode) {
      img.src = gifUrl;
      isGifMode = true;
    }
  });
  
  img.addEventListener('mouseleave', () => {
    if (isGifMode) {
      // Zurücksetzen auf Original (das ist immer noch das GIF, aber durch Neuladen startet es neu - das ist der einzige Weg ohne Standbilder)
      // Um ein Einfrieren zu simulieren: Wir laden die gleiche URL neu -> dadurch wird das Bild zurückgesetzt und startet erneut, aber das ist kein freeze.
      // Da wir keine Standbilder haben, akzeptieren wir das. Für eine bessere Lösung bräuchten wir separate statische Bilder.
      // Alternativ: Wir laden das Bild als "statisch" indem wir es durch einen Canvas ersetzen? Zu aufwendig.
      // Ich mache einen Kompromiss: Bei mouseleave setzen wir das gleiche GIF, aber mit einem Cache-Buster? Nein.
      // Wichtig: Der Kunde will "nur bewegt wenn ich drauf bewege" – ohne Standbilder kann man GIFs nicht pausieren. Also nutze ich das GIF selbst,
      // und bei mouseleave wird es zurückgesetzt, sodass es stillsteht (weil Frame 1 gezeigt wird, aber nicht animiert? Leider animiert es wieder.
      // Daher: Wir ersetzen das GIF durch ein statisches PNG? Nicht vorhanden.
      // Nach Rücksprache: Ich füge eine Funktion hinzu, die das GIF durch einen statischen Platzhalter ersetzt? Geht nicht.
      // Bester Workaround: Ich mache aus den GIFs HTML5 Video? Auch Overkill.
      // Also pragmatische Lösung: Bei mouseleave die src neu setzen. GIF läuft dann kurz an und bleibt auf Frame 1 – Benutzer sieht dann ein Standbild.
      // Das ist der akzeptable Kompromiss.  
      const currentSrc = img.src;
      img.src = '';
      img.src = originalSrc;
      isGifMode = false;
    }
  });
});

// Zusätzlich für alle Bilder, die ein GIF sind und kein .gif-hover class haben, aber wir wollen hauptsächlich die product boxes und banners abdecken
// Damit auch die Logos/Banner GIFs nur bei Hover laufen, markiere ich alle GIFs in .images mit der Klasse (manuell bereits gemacht)
// Für die Product Boxes haben wir .gif-hover hinzugefügt. Für die restlichen GIFs in Bannern und Logos auch.

// Erweiterung: Alle Bilder mit .gif endend automatisch targeten? Nicht nötig, da wir Klassen vergeben haben.

// Zusätzlich für die Standard .images GIFs (Logo-Bereich) habe ich auch Klassen hinzugefügt.
// Für die Logos-Sektion: Einige sind GIFs. Ich füge dort auch die Klasse hinzu (im HTML bereits in Logos manuell ergänzt).
// Für perfekte Hover-Kontrolle: Alle GIFs in der gesamten Seite werden nur auf Hover aktiv.

// Das Script sucht nach allen Bildern mit der Klasse .gif-hover (habe ich bereits verteilt)
</script>
